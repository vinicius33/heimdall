# Copy this file to .github/workflows/heimdall.yml in every target repo,
# then add the Actions secrets: HEIMDALL_CALLBACK_SECRET and exactly one of
# CLAUDE_CODE_OAUTH_TOKEN (personal / Max subscription) or ANTHROPIC_API_KEY (work).
name: heimdall

on:
  repository_dispatch:
    types: [heimdall]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  run:
    uses: vinicius33/heimdall/.github/workflows/runner.yml@main
    with:
      payload: ${{ toJSON(github.event.client_payload) }}
      # Optional: override the Claude Code tool allowlist for this repo, e.g.
      # to allow the test runner or build tools. Keep network tools out —
      # issue text is untrusted input.
      # allowed_tools: 'Edit,Read,Write,Glob,Grep,TodoWrite,Bash(git:*),Bash(npm:*),Bash(npx:*),Bash(cat:*),Bash(ls:*),Bash(make:*)'
    secrets: inherit
