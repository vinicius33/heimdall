# Reusable Heimdall runner (SPEC §4.3, §10). Target repos call this from a small
# stub workflow (see stubs/heimdall.yml) triggered by repository_dispatch.
#
# Multi-repo sessions (SPEC §10): when the target repo is a meta repo with git
# submodules, they are checked out on the session branch too, and every repo
# that changed gets its own push + PR. A repo without submodules follows the
# exact same path with a repo set of one.
name: heimdall-runner

on:
  workflow_call:
    inputs:
      payload:
        description: JSON client_payload from the repository_dispatch event
        required: true
        type: string
      allowed_tools:
        description: >-
          Claude Code tool allowlist. Default adds common read-only shell
          commands on top of file tools + git/npm. Keep network tools
          (WebFetch/WebSearch, curl/wget) out — issue text is untrusted input
          (SPEC §8 prompt-injection mitigation).
        required: false
        type: string
        default: 'Edit,Read,Write,Glob,Grep,TodoWrite,Bash(git:*),Bash(npm:*),Bash(npx:*),Bash(cat:*),Bash(ls:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(find:*),Bash(mkdir:*)'

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  heimdall:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # NOTE: CALLBACK_SECRET is deliberately step-scoped, not job-scoped —
    # job-level env is inherited by Claude's Bash subprocesses (readable via
    # /proc/self/environ), and Claude runs on untrusted issue text. The same
    # goes for the §10.2 repo token: persist-credentials is false and git auth
    # is passed per step via GIT_CONFIG_* env, so no credential is on disk (or
    # in the environment) during the Claude step.
    steps:
      - name: Parse payload
        id: p
        env:
          PAYLOAD: ${{ inputs.payload }}
        run: |
          {
            echo "session_id=$(jq -r '.session_id' <<<"$PAYLOAD")"
            echo "issue_id=$(jq -r '.issue_id' <<<"$PAYLOAD")"
            echo "issue_title=$(jq -r '.issue_title' <<<"$PAYLOAD")"
            echo "issue_url=$(jq -r '.issue_url' <<<"$PAYLOAD")"
            echo "branch=$(jq -r '.branch' <<<"$PAYLOAD")"
            echo "kind=$(jq -r '.kind' <<<"$PAYLOAD")"
            echo "callback_url=$(jq -r '.callback_url' <<<"$PAYLOAD")"
          } >>"$GITHUB_OUTPUT"

      - name: Report started
        env:
          CALLBACK_SECRET: ${{ secrets.HEIMDALL_CALLBACK_SECRET }}
          CALLBACK_URL: ${{ steps.p.outputs.callback_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SESSION_ID: ${{ steps.p.outputs.session_id }}
        run: |
          jq -n --arg sid "$SESSION_ID" --arg url "$RUN_URL" \
            '{session_id: $sid, event: "started", run_url: $url}' |
          curl -fsS -X POST "$CALLBACK_URL/callback" \
            -H "authorization: Bearer $CALLBACK_SECRET" \
            -H "content-type: application/json" \
            -d @-

      - name: Fetch repo token
        # Session-scoped App installation token covering this repo + its
        # GitHub-resolvable submodules (SPEC §10.2). Falls back to the
        # run-scoped github.token, which is enough for a repo without
        # submodules (and for gateways predating the /token endpoint).
        id: repotoken
        env:
          CALLBACK_SECRET: ${{ secrets.HEIMDALL_CALLBACK_SECRET }}
          CALLBACK_URL: ${{ steps.p.outputs.callback_url }}
          SESSION_ID: ${{ steps.p.outputs.session_id }}
        run: |
          if RESP=$(jq -n --arg sid "$SESSION_ID" '{session_id: $sid}' |
            curl -fsS -X POST "$CALLBACK_URL/token" \
              -H "authorization: Bearer $CALLBACK_SECRET" \
              -H "content-type: application/json" \
              -d @-); then
            TOKEN=$(jq -r '.token // empty' <<<"$RESP")
            if [ -n "$TOKEN" ]; then
              echo "::add-mask::$TOKEN"
              echo "token=$TOKEN" >>"$GITHUB_OUTPUT"
            fi
          else
            echo "token endpoint unavailable — using the run-scoped token (single-repo mode)"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.repotoken.outputs.token || github.token }}
          # Never leave credentials in git config for the Claude step; the
          # steps that need remote access get GIT_CONFIG_* env instead.
          persist-credentials: false

      - name: Prepare branches
        env:
          BRANCH: ${{ steps.p.outputs.branch }}
          # Env-scoped git auth (github.com https + ssh remotes), gone after this step.
          GIT_CONFIG_COUNT: '2'
          GIT_CONFIG_KEY_0: url.https://x-access-token:${{ steps.repotoken.outputs.token || github.token }}@github.com/.insteadOf
          GIT_CONFIG_VALUE_0: 'https://github.com/'
          GIT_CONFIG_KEY_1: url.https://x-access-token:${{ steps.repotoken.outputs.token || github.token }}@github.com/.insteadOf
          GIT_CONFIG_VALUE_1: 'git@github.com:'
        run: |
          # Identity of the Heimdall GitHub App's bot user (heimdall-bridge).
          # The id+slug email format is what makes GitHub attribute
          # commits/co-authorship to the right bot.
          prepare() {
            git config user.name "heimdall-bridge[bot]"
            git config user.email "300811537+heimdall-bridge[bot]@users.noreply.github.com"
            if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
              git fetch origin "$BRANCH"
              git checkout "$BRANCH"
            else
              git checkout -b "$BRANCH"
            fi
          }
          prepare
          # Same branch name in every submodule: it is the cross-repo
          # correlation key, and it un-detaches submodule HEADs so the agent's
          # commits land on the session branch (SPEC §10.3).
          export -f prepare
          git submodule foreach --recursive 'bash -c prepare'

      - name: Fetch prompt context
        env:
          CALLBACK_SECRET: ${{ secrets.HEIMDALL_CALLBACK_SECRET }}
          CALLBACK_URL: ${{ steps.p.outputs.callback_url }}
          SESSION_ID: ${{ steps.p.outputs.session_id }}
        run: |
          curl -fsS "$CALLBACK_URL/context/$SESSION_ID" \
            -H "authorization: Bearer $CALLBACK_SECRET" \
            -o "$RUNNER_TEMP/heimdall-prompt.md"

      - name: Run Claude Code
        # Pinned exact release (SPEC §8). NOTE: base-action has no v1 tag —
        # only v0.0.x. Bump deliberately, never float.
        uses: anthropics/claude-code-base-action@v0.0.63
        with:
          prompt_file: ${{ runner.temp }}/heimdall-prompt.md
          # The action's baked-in default model has been retired — always set one.
          model: claude-sonnet-5
          allowed_tools: ${{ inputs.allowed_tools }}
          max_turns: '50'
          # Set exactly one of these two as an Actions secret (SPEC §6.3).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Push branches and open PRs
        id: push
        env:
          GH_TOKEN: ${{ steps.repotoken.outputs.token || github.token }}
          BRANCH: ${{ steps.p.outputs.branch }}
          ISSUE_ID: ${{ steps.p.outputs.issue_id }}
          ISSUE_TITLE: ${{ steps.p.outputs.issue_title }}
          ISSUE_URL: ${{ steps.p.outputs.issue_url }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GIT_CONFIG_COUNT: '2'
          GIT_CONFIG_KEY_0: url.https://x-access-token:${{ steps.repotoken.outputs.token || github.token }}@github.com/.insteadOf
          GIT_CONFIG_VALUE_0: 'https://github.com/'
          GIT_CONFIG_KEY_1: url.https://x-access-token:${{ steps.repotoken.outputs.token || github.token }}@github.com/.insteadOf
          GIT_CONFIG_VALUE_1: 'git@github.com:'
        run: |
          set -euo pipefail
          PR_URLS_FILE="$RUNNER_TEMP/heimdall-pr-urls"
          : >"$PR_URLS_FILE"

          commit_leftovers() {
            if ! git diff --quiet || ! git diff --cached --quiet; then
              git add -A
              git commit -m "chore: heimdall run artifacts for $ISSUE_ID"
            fi
          }

          # Push the session branch and open (or find) the repo's PR.
          # $1 = "owner/repo", $2 = base branch.
          push_and_pr() {
            if [ "$(git rev-list --count "origin/$2..HEAD")" = "0" ]; then
              return 0
            fi
            git push -u origin "$BRANCH"
            PR_URL=$(gh pr list --repo "$1" --head "$BRANCH" --json url --jq '.[0].url // empty')
            if [ -z "$PR_URL" ]; then
              PR_BODY="Automated by Heimdall for Linear issue [$ISSUE_ID]($ISSUE_URL)."
              PR_BODY="$PR_BODY"$'\n\n'"🤖 Generated with [Claude Code](https://claude.com/claude-code)"
              PR_URL=$(gh pr create --repo "$1" --head "$BRANCH" --base "$2" \
                --title "$ISSUE_ID: $ISSUE_TITLE" --body "$PR_BODY")
            fi
            echo "$PR_URL" >>"$PR_URLS_FILE"
          }

          SUBMODULE_PATHS=""
          if [ -f .gitmodules ]; then
            SUBMODULE_PATHS=$(git config --file .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}')
          fi

          # Children first, so a child failure aborts before the root PR exists.
          for path in $SUBMODULE_PATHS; do
            [ -e "$path/.git" ] || continue
            (
              cd "$path"
              URL=$(git config --get remote.origin.url)
              case "$URL" in
                https://github.com/*) REPO="${URL#https://github.com/}" ;;
                git@github.com:*) REPO="${URL#git@github.com:}" ;;
                *)
                  echo "skipping $path — origin is not on github.com"
                  exit 0
                  ;;
              esac
              REPO="${REPO%.git}"
              commit_leftovers
              CHILD_DEFAULT=$(gh api "repos/$REPO" --jq .default_branch)
              git fetch origin "$CHILD_DEFAULT" --quiet
              push_and_pr "$REPO" "$CHILD_DEFAULT"
            )
          done

          # Root repo. Pointer-bump guard (SPEC §10.4): submodule pointer
          # changes are unstaged before the commit check — the meta repo never
          # PRs pointer updates; only files it owns itself.
          commit_root_leftovers() {
            git add -A
            for p in $SUBMODULE_PATHS; do
              git restore --staged "$p" 2>/dev/null || true
            done
            if ! git diff --cached --quiet; then
              git commit -m "chore: heimdall run artifacts for $ISSUE_ID"
            fi
          }
          commit_root_leftovers
          push_and_pr "$GITHUB_REPOSITORY" "$DEFAULT_BRANCH"

          if [ -s "$PR_URLS_FILE" ]; then
            {
              echo "changed=true"
              echo "pr_urls=$(jq -R . <"$PR_URLS_FILE" | jq -cs .)"
            } >>"$GITHUB_OUTPUT"
          else
            echo "changed=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Report completed
        if: success() && steps.push.outputs.changed == 'true'
        env:
          CALLBACK_SECRET: ${{ secrets.HEIMDALL_CALLBACK_SECRET }}
          CALLBACK_URL: ${{ steps.p.outputs.callback_url }}
          SESSION_ID: ${{ steps.p.outputs.session_id }}
          PR_URLS: ${{ steps.push.outputs.pr_urls }}
        run: |
          # pr_url (first entry) kept alongside pr_urls for gateways predating SPEC §10.
          jq -n --arg sid "$SESSION_ID" --argjson urls "$PR_URLS" \
            '{session_id: $sid, event: "completed", pr_urls: $urls, pr_url: $urls[0]}' |
          curl -fsS -X POST "$CALLBACK_URL/callback" \
            -H "authorization: Bearer $CALLBACK_SECRET" \
            -H "content-type: application/json" \
            -d @-

      - name: Report no changes
        if: success() && steps.push.outputs.changed != 'true'
        env:
          CALLBACK_SECRET: ${{ secrets.HEIMDALL_CALLBACK_SECRET }}
          CALLBACK_URL: ${{ steps.p.outputs.callback_url }}
          SESSION_ID: ${{ steps.p.outputs.session_id }}
        run: |
          jq -n --arg sid "$SESSION_ID" \
            '{session_id: $sid, event: "failed", message: "The run finished without producing any changes."}' |
          curl -fsS -X POST "$CALLBACK_URL/callback" \
            -H "authorization: Bearer $CALLBACK_SECRET" \
            -H "content-type: application/json" \
            -d @-

      - name: Report failure
        if: failure()
        env:
          CALLBACK_SECRET: ${{ secrets.HEIMDALL_CALLBACK_SECRET }}
          CALLBACK_URL: ${{ steps.p.outputs.callback_url }}
          SESSION_ID: ${{ steps.p.outputs.session_id }}
        run: |
          jq -n --arg sid "$SESSION_ID" \
            '{session_id: $sid, event: "failed", message: "The GitHub Actions run failed — check the logs."}' |
          curl -fsS -X POST "$CALLBACK_URL/callback" \
            -H "authorization: Bearer $CALLBACK_SECRET" \
            -H "content-type: application/json" \
            -d @- || true
