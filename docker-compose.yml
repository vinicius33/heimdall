services:
  gateway:
    build: .
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    env_file: .env
    environment:
      # Overrides any REDIS_URL in .env so the gateway talks to the bundled Redis.
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
